<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Demo — [NOME DO PROJETO]</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080810;
  --bg2:      #0f0f1a;
  --card:     #111120;
  --cyan:     #00d4ff;
  --violet:   #7b2fff;
  --cyan-dim: rgba(0,212,255,0.10);
  --vio-dim:  rgba(123,47,255,0.10);
  --text:     #e0e0f0;
  --muted:    #7070a0;
  --border:   rgba(0,212,255,0.14);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--violet); border-radius: 2px; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 5vw;
  background: rgba(8,8,16,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Space Mono', monospace;
  font-size: 0.95rem;
  color: var(--cyan);
}
.nav-logo span { color: var(--violet); }
.nav-back {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--cyan); }
.nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
.nav-actions { display: flex; gap: 0.75rem; }
.btn-sm {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1.1rem;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  border-radius: 4px;
  text-decoration: none;
  transition: opacity 0.2s, transform 0.2s;
  letter-spacing: 0.03em;
}
.btn-sm svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
.btn-primary-sm {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #fff;
}
.btn-primary-sm:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-outline-sm {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline-sm:hover { border-color: var(--cyan); color: var(--cyan); transform: translateY(-1px); }

/* ── HERO ── */
#hero {
  padding: 9rem 5vw 5rem;
  position: relative;
  overflow: hidden;
}
.hero-glow {
  position: absolute; border-radius: 50%;
  filter: blur(110px); pointer-events: none;
}
.glow-r { top: -80px; right: -80px; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,212,255,0.14) 0%, transparent 70%); }
.glow-l { bottom: -60px; left: 20%; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(123,47,255,0.10) 0%, transparent 70%); }

.hero-inner {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 3rem; align-items: center; max-width: 1100px;
}

.hero-tag {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; color: var(--cyan);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 1.2rem;
}
.hero-tag::before { content:''; display:inline-block; width:24px; height:1px; background:var(--cyan); }

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(2rem, 4vw, 3.4rem);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin-bottom: 1rem;
}
h1 .accent {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.hero-desc {
  font-size: 1rem; color: var(--muted);
  line-height: 1.85; margin-bottom: 2rem; max-width: 440px;
}

.hero-meta {
  display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 2rem;
}
.meta-item {
  display: flex; align-items: center; gap: 0.4rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em;
}
.meta-item svg { width: 14px; height: 14px; stroke: var(--cyan); fill: none; }

.hero-ctas { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.btn-hero-p {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.8rem 1.6rem;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #fff; font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  text-decoration: none; border-radius: 4px;
  transition: opacity 0.2s, transform 0.2s; letter-spacing: 0.03em;
}
.btn-hero-p svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }
.btn-hero-p:hover { opacity: 0.85; transform: translateY(-2px); }
.btn-hero-o {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.8rem 1.6rem;
  border: 1px solid var(--border);
  color: var(--text); font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem; font-weight: 500;
  text-decoration: none; border-radius: 4px;
  transition: border-color 0.2s, color 0.2s, transform 0.2s; letter-spacing: 0.03em;
}
.btn-hero-o svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }
.btn-hero-o:hover { border-color: var(--cyan); color: var(--cyan); transform: translateY(-2px); }

/* ── SCREEN MOCKUP ── */
.screen-wrap {
  position: relative;
}
.screen-frame {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(0,212,255,0.06);
}
.screen-chrome {
  background: #0d0d1e;
  padding: 0.6rem 1rem;
  display: flex; align-items: center; gap: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.chrome-dots { display: flex; gap: 6px; }
.chrome-dot { width: 10px; height: 10px; border-radius: 50%; }
.chrome-dot:nth-child(1) { background: rgba(255,95,87,0.5); }
.chrome-dot:nth-child(2) { background: rgba(254,188,46,0.5); }
.chrome-dot:nth-child(3) { background: rgba(40,200,64,0.5); }
.chrome-url {
  flex: 1; background: #1a1a30; border-radius: 4px;
  padding: 0.2rem 0.75rem; margin: 0 1rem;
  font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted);
}

/* tabs inside mockup */
.screen-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: #0f0f1e;
}
.screen-tab {
  padding: 0.6rem 1.2rem;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.78rem; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.screen-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

.screen-body { position: relative; min-height: 280px; }
.screen-panel { display: none; padding: 1.5rem; }
.screen-panel.active { display: block; }

/* badge status */
.status-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.25rem 0.75rem;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; color: var(--cyan); letter-spacing: 0.1em;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--cyan);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

/* ── SECTION BASE ── */
section { padding: 5rem 5vw; max-width: 1200px; margin: 0 auto; }
section.full { max-width: none; padding-left: 5vw; padding-right: 5vw; }
.section-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; color: var(--cyan);
  letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.6rem;
}
.section-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  font-weight: 700; line-height: 1.1;
  letter-spacing: -0.02em; margin-bottom: 0.8rem;
}
.section-title .accent {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.divider { width: 36px; height: 2px; background: linear-gradient(90deg, var(--cyan), var(--violet)); margin-bottom: 2.5rem; }
.section-sub { color: var(--muted); font-size: 1rem; line-height: 1.8; max-width: 560px; margin-bottom: 3rem; }

/* ── FEATURES ── */
#features { background: var(--bg2); max-width: none; padding: 5rem 5vw; }
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem; max-width: 1100px; margin: 0 auto;
}
.feature-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.8rem;
  position: relative; overflow: hidden;
  transition: border-color 0.25s, transform 0.25s;
}
.feature-card::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--violet));
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s;
}
.feature-card:hover { border-color: rgba(0,212,255,0.35); transform: translateY(-4px); }
.feature-card:hover::after { transform: scaleX(1); }
.feature-icon {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--cyan-dim);
  border: 1px solid rgba(0,212,255,0.18);
  border-radius: 8px; margin-bottom: 1.2rem;
}
.feature-icon svg { width: 20px; height: 20px; stroke: var(--cyan); fill: none; }
.feature-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem;
}
.feature-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.75; }

/* ── TECH STACK ── */
#stack { background: var(--bg); }
.stack-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem; max-width: 1100px;
}
.stack-item {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.9rem 1.2rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: border-color 0.2s;
}
.stack-item:hover { border-color: rgba(123,47,255,0.4); }
.stack-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: var(--vio-dim);
  border-radius: 4px; flex-shrink: 0;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; color: var(--violet);
  letter-spacing: -0.02em;
}
.stack-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem; font-weight: 600;
}
.stack-role { font-size: 0.72rem; color: var(--muted); }

/* ── ARCHITECTURE ── */
#arch { background: var(--bg2); max-width: none; padding: 5rem 5vw; }
.arch-inner { max-width: 900px; margin: 0 auto; }
.arch-diagram {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2rem;
}
.arch-row {
  display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center;
}
.arch-row:last-child { margin-bottom: 0; }
.arch-box {
  flex: 1; padding: 0.9rem 1rem;
  border-radius: 6px; text-align: center;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.82rem; font-weight: 600;
}
.arch-box.cyan {
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.25);
  color: var(--cyan);
}
.arch-box.violet {
  background: rgba(123,47,255,0.08);
  border: 1px solid rgba(123,47,255,0.25);
  color: #a87fff;
}
.arch-box.gray {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--muted);
}
.arch-arrow {
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 1.2rem;
}
.arch-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  text-align: center; margin-bottom: 0.4rem;
}

/* ── HIGHLIGHTS ── */
#highlights { background: var(--bg); }
.highlights-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 3rem; align-items: center; max-width: 1000px;
}
.hl-number {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 3.5rem; font-weight: 700; line-height: 1;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hl-label { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }
.hl-list { list-style: none; }
.hl-list li {
  display: flex; align-items: flex-start; gap: 0.8rem;
  font-size: 0.9rem; color: var(--muted);
  line-height: 1.7; margin-bottom: 0.9rem;
}
.hl-list li::before {
  content: '▸'; color: var(--violet);
  font-size: 0.7rem; margin-top: 4px; flex-shrink: 0;
}
.hl-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
}
.hl-stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1.2rem;
}

/* ── CTA ── */
#cta { background: var(--bg2); max-width: none; padding: 5rem 5vw; }
.cta-inner {
  max-width: 700px; margin: 0 auto; text-align: center;
}
.cta-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.5rem);
  font-weight: 700; line-height: 1.1;
  letter-spacing: -0.02em; margin-bottom: 1rem;
}
.cta-title .accent {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.cta-sub { color: var(--muted); font-size: 1rem; line-height: 1.8; margin-bottom: 2.5rem; }
.cta-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-cta-p {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.9rem 2rem;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #fff; font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem; font-weight: 600;
  text-decoration: none; border-radius: 4px;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-cta-p:hover { opacity: 0.85; transform: translateY(-2px); }
.btn-cta-p svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
.btn-cta-o {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.9rem 2rem;
  border: 1px solid var(--border);
  color: var(--text); font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem; font-weight: 500;
  text-decoration: none; border-radius: 4px;
  transition: border-color 0.2s, color 0.2s, transform 0.2s;
}
.btn-cta-o:hover { border-color: var(--cyan); color: var(--cyan); transform: translateY(-2px); }
.btn-cta-o svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }

/* ── FOOTER ── */
footer {
  padding: 1.8rem 5vw;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
}
footer .logo { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--muted); }
footer .logo span { color: var(--cyan); }
footer p { font-size: 0.75rem; color: var(--muted); }

/* ── REVEAL ── */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }
@media (prefers-reduced-motion: reduce) { .reveal { opacity:1; transform:none; transition:none; } }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .hero-inner { grid-template-columns: 1fr; }
  .highlights-grid { grid-template-columns: 1fr; }
  .hl-stats { grid-template-columns: 1fr 1fr; }
  .arch-row { flex-direction: column; }
  .arch-arrow { transform: rotate(90deg); }
}
</style>
</head>
